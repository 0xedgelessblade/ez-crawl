<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- ez-crawl banner — warm paper + network/crawl nodes -->

  <!-- === Palette ===
    bg:        #f5f1eb  (warm paper)
    dark:      #2c2420  (rich brown)
    mid:       #8a7d6f  (warm gray)
    accent:    #e67a1e  (cloudflare-inspired orange)
    light-acc: #f0a860  (soft amber)
    line:      #c4b8a8  (muted tan)
  -->

  <defs>
    <!-- Paper grain texture -->
    <filter id="paper-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply"/>
    </filter>

    <!-- Sketch wobble for hand-drawn feel -->
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="turbulence"/>
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Soft glow for central icon -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#f5f1eb" filter="url(#paper-grain)"/>

  <!-- Subtle grid lines (notebook feel) -->
  <g opacity="0.045" stroke="#b4aa9b" stroke-width="0.5">
    <line x1="0" y1="29" x2="1200" y2="29"/><line x1="0" y1="58" x2="1200" y2="58"/>
    <line x1="0" y1="87" x2="1200" y2="87"/><line x1="0" y1="116" x2="1200" y2="116"/>
    <line x1="0" y1="145" x2="1200" y2="145"/><line x1="0" y1="174" x2="1200" y2="174"/>
    <line x1="0" y1="203" x2="1200" y2="203"/><line x1="0" y1="232" x2="1200" y2="232"/>
    <line x1="0" y1="261" x2="1200" y2="261"/><line x1="0" y1="290" x2="1200" y2="290"/>
    <line x1="0" y1="319" x2="1200" y2="319"/><line x1="0" y1="348" x2="1200" y2="348"/>
    <line x1="0" y1="377" x2="1200" y2="377"/>
  </g>

  <!-- === LEFT decorative cluster: scattered web nodes === -->
  <g filter="url(#sketch)" opacity="0.12">
    <!-- Nodes -->
    <circle cx="80" cy="90" r="6" fill="#8a7d6f"/>
    <circle cx="150" cy="130" r="4" fill="none" stroke="#8a7d6f" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="110" cy="200" r="5" fill="#c4b8a8"/>
    <circle cx="200" cy="80" r="3" fill="#8a7d6f"/>
    <circle cx="60" cy="280" r="4" fill="none" stroke="#c4b8a8" stroke-width="1"/>
    <circle cx="170" cy="310" r="7" fill="#c4b8a8" opacity="0.5"/>
    <circle cx="240" cy="180" r="3" fill="#8a7d6f"/>
    <!-- Edges -->
    <line x1="80" y1="90" x2="150" y2="130" stroke="#c4b8a8" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="150" y1="130" x2="110" y2="200" stroke="#c4b8a8" stroke-width="0.6"/>
    <line x1="80" y1="90" x2="200" y2="80" stroke="#c4b8a8" stroke-width="0.6" stroke-dasharray="5,4"/>
    <line x1="110" y1="200" x2="60" y2="280" stroke="#c4b8a8" stroke-width="0.5"/>
    <line x1="60" y1="280" x2="170" y2="310" stroke="#c4b8a8" stroke-width="0.7" stroke-dasharray="3,3"/>
    <line x1="150" y1="130" x2="240" y2="180" stroke="#c4b8a8" stroke-width="0.5"/>
  </g>

  <!-- === RIGHT decorative cluster === -->
  <g filter="url(#sketch)" opacity="0.12">
    <circle cx="1020" cy="100" r="5" fill="#8a7d6f"/>
    <circle cx="1100" cy="70" r="4" fill="none" stroke="#8a7d6f" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="1060" cy="190" r="6" fill="#c4b8a8" opacity="0.5"/>
    <circle cx="1140" cy="160" r="3" fill="#8a7d6f"/>
    <circle cx="980" cy="300" r="4" fill="none" stroke="#c4b8a8" stroke-width="1"/>
    <circle cx="1080" cy="330" r="5" fill="#c4b8a8"/>
    <circle cx="1150" cy="280" r="3" fill="#8a7d6f"/>
    <line x1="1020" y1="100" x2="1100" y2="70" stroke="#c4b8a8" stroke-width="0.7"/>
    <line x1="1020" y1="100" x2="1060" y2="190" stroke="#c4b8a8" stroke-width="0.6" stroke-dasharray="4,3"/>
    <line x1="1100" y1="70" x2="1140" y2="160" stroke="#c4b8a8" stroke-width="0.5"/>
    <line x1="1060" y1="190" x2="980" y2="300" stroke="#c4b8a8" stroke-width="0.6"/>
    <line x1="980" y1="300" x2="1080" y2="330" stroke="#c4b8a8" stroke-width="0.7" stroke-dasharray="3,3"/>
    <line x1="1080" y1="330" x2="1150" y2="280" stroke="#c4b8a8" stroke-width="0.5"/>
  </g>

  <!-- === CENTRAL icon cluster: crawler network === -->
  <g transform="translate(600, 140)" filter="url(#sketch)">
    <!-- Central "origin" node (the URL you give it) -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#e67a1e" stroke-width="2.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="7" fill="#e67a1e" opacity="0.6"/>

    <!-- Discovered pages radiating out -->
    <circle cx="-80" cy="-40" r="10" fill="none" stroke="#8a7d6f" stroke-width="1.5" opacity="0.5"/>
    <circle cx="90" cy="-30" r="10" fill="none" stroke="#8a7d6f" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-60" cy="55" r="8" fill="none" stroke="#8a7d6f" stroke-width="1.2" opacity="0.45"/>
    <circle cx="70" cy="50" r="9" fill="none" stroke="#8a7d6f" stroke-width="1.3" opacity="0.45"/>
    <circle cx="-130" cy="10" r="6" fill="none" stroke="#c4b8a8" stroke-width="1" opacity="0.35"/>
    <circle cx="140" cy="15" r="6" fill="none" stroke="#c4b8a8" stroke-width="1" opacity="0.35"/>
    <circle cx="0" cy="-70" r="7" fill="none" stroke="#c4b8a8" stroke-width="1" opacity="0.35"/>

    <!-- Small filled dots (leaf pages) -->
    <circle cx="-110" cy="-65" r="3" fill="#f0a860" opacity="0.4"/>
    <circle cx="125" cy="-55" r="3" fill="#f0a860" opacity="0.4"/>
    <circle cx="-150" cy="45" r="3" fill="#f0a860" opacity="0.35"/>
    <circle cx="165" cy="50" r="3" fill="#f0a860" opacity="0.35"/>
    <circle cx="-30" cy="-85" r="2.5" fill="#f0a860" opacity="0.3"/>
    <circle cx="35" cy="-80" r="2.5" fill="#f0a860" opacity="0.3"/>

    <!-- Crawl edges (dashed = discovering, solid = fetched) -->
    <line x1="0" y1="0" x2="-80" y2="-40" stroke="#e67a1e" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="0" x2="90" y2="-30" stroke="#e67a1e" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="0" x2="-60" y2="55" stroke="#e67a1e" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="0" x2="70" y2="50" stroke="#e67a1e" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#e67a1e" stroke-width="1" opacity="0.3"/>

    <!-- Secondary edges -->
    <line x1="-80" y1="-40" x2="-130" y2="10" stroke="#c4b8a8" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,3"/>
    <line x1="-80" y1="-40" x2="-110" y2="-65" stroke="#c4b8a8" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="90" y1="-30" x2="140" y2="15" stroke="#c4b8a8" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,3"/>
    <line x1="90" y1="-30" x2="125" y2="-55" stroke="#c4b8a8" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="-130" y1="10" x2="-150" y2="45" stroke="#c4b8a8" stroke-width="0.5" opacity="0.25"/>
    <line x1="140" y1="15" x2="165" y2="50" stroke="#c4b8a8" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="-70" x2="-30" y2="-85" stroke="#c4b8a8" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="-70" x2="35" y2="-80" stroke="#c4b8a8" stroke-width="0.5" opacity="0.25"/>
    <line x1="-60" y1="55" x2="-130" y2="10" stroke="#c4b8a8" stroke-width="0.6" opacity="0.25" stroke-dasharray="3,4"/>
    <line x1="70" y1="50" x2="140" y2="15" stroke="#c4b8a8" stroke-width="0.6" opacity="0.25" stroke-dasharray="3,4"/>
  </g>

  <!-- === Bottom scattered elements === -->
  <g filter="url(#sketch)" opacity="0.08">
    <circle cx="350" cy="360" r="3" fill="#8a7d6f"/>
    <circle cx="420" cy="370" r="2" fill="#c4b8a8"/>
    <line x1="350" y1="360" x2="420" y2="370" stroke="#c4b8a8" stroke-width="0.5"/>
    <circle cx="780" cy="365" r="2.5" fill="#8a7d6f"/>
    <circle cx="850" cy="355" r="2" fill="#c4b8a8"/>
    <line x1="780" y1="365" x2="850" y2="355" stroke="#c4b8a8" stroke-width="0.5"/>
  </g>

  <!-- === Typography === -->

  <!-- Title -->
  <text x="600" y="275" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="46" font-weight="bold" fill="#2c2420" letter-spacing="3">
    ez-crawl
  </text>

  <!-- Subtitle -->
  <text x="600" y="308" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" fill="#8a7d6f" letter-spacing="4" font-style="italic">
    One URL in, entire site out — as Markdown.
  </text>

  <!-- Tech line -->
  <g transform="translate(600, 355)" text-anchor="middle">
    <text font-family="'Courier New', monospace" font-size="11" fill="#a09888" letter-spacing="3">
      Cloudflare /crawl  ·  Bash + Python  ·  Claude Skill  ·  Free Tier Friendly
    </text>
  </g>
</svg>